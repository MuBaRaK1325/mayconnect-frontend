<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mayconnect - Login</title>
<meta name="theme-color" content="#4DA6FF">
<style>
:root{
  --ice-50:#E6F3FF;
  --ice-100:#B3D9FF;
  --ice-400:#4DA6FF;
  --ice-500:#2B7CD6;
  --dark:#0A1A24;
  --glass:rgba(255,255,255,0.65);
  --glass-border:rgba(77,166,255,0.25);
  --shadow:0 20px 60px rgba(43,124,214,0.18);
  --shadow-soft:0 8px 24px rgba(43,124,214,0.12);
}

*{margin:0;padding:0;box-sizing:border-box;font-family:"Inter",system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif;}

body{
  background: radial-gradient(1200px 800px at 80% -10%, var(--ice-100) 0%, transparent 50%),
              radial-gradient(800px 600px at -10% 110%, var(--ice-50) 0%, transparent 50%),
              linear-gradient(135deg,#F0F8FF,#E6F3FF);
  color:var(--dark);
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  padding:24px;
  animation:fadeIn 0.6s ease;
}

@keyframes fadeIn{
  from{opacity:0;transform:translateY(10px)}
  to{opacity:1;transform:translateY(0)}
}

/* LOADER */
#loginLoader{
  position:fixed;
  top:0;left:0;
  width:100%;height:100%;
  background:rgba(230,243,255,0.9);
  backdrop-filter:blur(8px);
  display:none;
  align-items:center;
  justify-content:center;
  z-index:9999;
  flex-direction:column;
  gap:16px;
}
.loaderRing{
  width:70px;
  height:70px;
  border:6px solid rgba(77,166,255,0.2);
  border-top:6px solid var(--ice-500);
  border-radius:50%;
  animation:spin 1s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg)}}
.loaderText{
  color:var(--ice-500);
  font-weight:600;
  font-size:15px;
}

/* WRAPPER */
.wrapper{
  width:100%;
  max-width:420px;
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:28px;
}

/* LOGO */
.logo{
  width:110px;
  height:110px;
  border-radius:50%;
  border:3px solid var(--ice-400);
  padding:8px;
  background:white;
  box-shadow:0 0 0 6px rgba(77,166,255,0.15), 0 12px 30px rgba(43,124,214,0.25);
  object-fit:cover;
  transition:transform 0.3s ease, box-shadow 0.3s ease;
}
.logo:hover{
  transform:scale(1.03);
  box-shadow:0 0 0 8px rgba(77,166,255,0.2), 0 16px 40px rgba(43,124,214,0.3);
}

/* CARD */
.card{
  width:100%;
  background:var(--glass);
  backdrop-filter:blur(16px);
  -webkit-backdrop-filter:blur(16px);
  border:1px solid var(--glass-border);
  padding:32px 28px;
  border-radius:24px;
  box-shadow:var(--shadow);
}

.title{
  text-align:center;
  font-size:28px;
  font-weight:800;
  margin-bottom:6px;
  background:linear-gradient(135deg,var(--ice-500),var(--ice-400));
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  background-clip:text;
}

.subtitle{
  text-align:center;
  font-size:14px;
  color:#4A5568;
  margin-bottom:24px;
}

/* INPUT */
.inputBox{
  margin-bottom:16px;
  position:relative;
}
.inputBox label{
  display:block;
  font-size:13px;
  font-weight:600;
  color:#2D3748;
  margin-bottom:6px;
  margin-left:4px;
}
input{
  width:100%;
  padding:14px 16px;
  border-radius:14px;
  border:1.5px solid rgba(77,166,255,0.25);
  background:rgba(255,255,255,0.8);
  color:var(--dark);
  font-size:16px;
  transition:all 0.25s ease;
}
input::placeholder{color:#9CA3AF;}
input:focus{
  outline:none;
  border-color:var(--ice-400);
  background:white;
  box-shadow:0 0 0 4px rgba(77,166,255,0.15);
}

/* SHOW BUTTON */
.showBtn{
  position:absolute;
  right:14px;
  top:38px;
  background:none;
  border:none;
  color:var(--ice-500);
  cursor:pointer;
  font-size:13px;
  font-weight:600;
  transition:color 0.2s;
}
.showBtn:hover{color:var(--ice-400);}

/* BUTTON */
.loginBtn{
  width:100%;
  padding:15px;
  border:none;
  border-radius:14px;
  background:linear-gradient(135deg,var(--ice-400),var(--ice-500));
  color:white;
  font-weight:700;
  font-size:16px;
  margin-top:8px;
  cursor:pointer;
  box-shadow:0 8px 20px rgba(43,124,214,0.3);
  transition:all 0.25s ease;
}
.loginBtn:hover:not(:disabled){
  transform:translateY(-2px);
  box-shadow:0 12px 28px rgba(43,124,214,0.4);
}
.loginBtn:active:not(:disabled){transform:translateY(0);}
.loginBtn:disabled{opacity:0.6;cursor:not-allowed;}

/* BIOMETRIC */
.biometric{
  margin-top:16px;
  padding:14px;
  border-radius:14px;
  text-align:center;
  border:1.5px dashed rgba(77,166,255,0.4);
  background:rgba(255,255,255,0.5);
  cursor:pointer;
  font-weight:600;
  color:var(--ice-500);
  transition:all 0.25s ease;
}
.biometric:hover{
  background:rgba(255,255,255,0.8);
  border-color:var(--ice-400);
  transform:translateY(-1px);
}

/* SIGNUP LINK */
.signup{
  margin-top:16px;
  padding:14px;
  border-radius:14px;
  text-align:center;
  border:1.5px solid rgba(77,166,255,0.3);
  background:rgba(255,255,255,0.5);
  transition:all 0.25s ease;
}
.signup:hover{
  background:rgba(255,255,255,0.8);
  border-color:var(--ice-400);
}
.signup a{
  color:var(--ice-500);
  text-decoration:none;
  font-weight:600;
  font-size:14px;
  display:block;
}

@media(max-width:480px){
  .card{padding:28px 22px;}
  .title{font-size:26px;}
}
</style>
</head>

<body>

<div id="loginLoader">
  <div class="loaderRing"></div>
  <p class="loaderText">Logging in...</p>
</div>

<div class="wrapper">
  <img src="logo.png" class="logo" alt="Mayconnect Logo">

  <div class="card">
    <div class="title">Welcome Back</div>
    <div class="subtitle">Sign in to continue</div>

    <div class="inputBox">
      <label>Username or Email</label>
      <input id="loginUsername" placeholder="Enter username or email">
    </div>

    <div class="inputBox">
      <label>Password</label>
      <input id="loginPassword" type="password" placeholder="Enter password">
      <button type="button" class="showBtn" onclick="togglePassword()">Show</button>
    </div>

    <button id="loginBtn" class="loginBtn">Login</button>

    <div class="biometric" onclick="biometricLogin()">
      🔐 Login with Fingerprint / Face ID
    </div>

    <div class="signup">
      <a href="signup.html">Don't have an account? Create one</a>
    </div>
  </div>
</div>

<script src="login.js"></script>

<script>
function togglePassword(){
  const input=document.getElementById("loginPassword")
  const btn=document.querySelector(".showBtn")
  if(input.type==="password"){
    input.type="text"
    btn.innerText="Hide"
  }else{
    input.type="password"
    btn.innerText="Show"
  }
}
</script>

</body>
</html>

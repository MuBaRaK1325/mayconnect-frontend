<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>MAYCONNECT - Signup</title>

<style>

*{margin:0;padding:0;box-sizing:border-box;font-family:Arial;}

body{
background:#05031a;
color:white;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
flex-direction:column;
}

.logo{
width:110px;
height:110px;
border-radius:50%;
border:4px solid #2248c5;
padding:8px;
margin-bottom:40px;
box-shadow:0 0 20px #2256c5;
}

.card{
background:#05132e;
padding:30px;
border-radius:20px;
width:90%;
max-width:380px;
box-shadow:0 0 30px rgba(69, 34, 197, 0.2);
}

.title{text-align:center;font-size:26px;margin-bottom:25px;}

.inputBox{margin-bottom:18px;position:relative;}

input{
width:100%;
padding:14px;
border-radius:12px;
border:none;
background:#060214;
color:white;
}

.showBtn{
position:absolute;
right:12px;
top:50%;
transform:translateY(-50%);
background:none;
border:none;
color:#4a4cde;
cursor:pointer;
}

.signupBtn{
width:100%;
padding:14px;
border:none;
border-radius:12px;
background:#2240c5;
color:white;
margin-top:10px;
}

.loginLink{
margin-top:16px;
border:2px solid #2240c5;
padding:14px;
border-radius:12px;
text-align:center;
}

a{color:white;text-decoration:none;}

</style>
</head>

<body>

<img src="images/logo.png" class="logo">

<div class="card">

<div class="title">Create Account</div>

<div class="inputBox"><input id="username" placeholder="Username"></div>
<div class="inputBox"><input id="email" placeholder="Email"></div>

<div class="inputBox">
<input id="password" type="password" placeholder="Password">
<button class="showBtn" onclick="toggleField('password',this)">Show</button>
</div>

<div class="inputBox">
<input id="pin" type="password" placeholder="PIN" maxlength="4">
<button class="showBtn" onclick="toggleField('pin',this)">Show</button>
</div>

<button id="signupBtn" class="signupBtn">Create Account</button>

<a href="login.html"><div class="loginLink">Already have account</div></a>

</div>

<script src="signup.js"></script>

<script>
function toggleField(id,btn){
const i=document.getElementById(id)
if(i.type==="password"){i.type="text";btn.innerText="Hide"}
else{i.type="password";btn.innerText="Show"}
}
</script>

</body>
</html>

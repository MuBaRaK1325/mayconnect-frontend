<!DOCTYPE html>
<html>
<head>

<title>MAY CONNECT</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<script src="app.js"></script>

<style>

body{
margin:0;
font-family:sans-serif;
background:#f3f6ff;
}

/* HEADER */

.header{

background:#1c2cff;
color:white;
padding:20px;

}

/* WALLET CARD */

.walletCard{

background:linear-gradient(135deg,#1c2cff,#5b6cff);

color:white;

margin:20px;

padding:20px;

border-radius:15px;

box-shadow:0 10px 25px rgba(0,0,0,0.2);

}

/* ACTION GRID */

.actions{

display:grid;

grid-template-columns:repeat(4,1fr);

gap:10px;

margin:20px;

}

.actionBtn{

background:white;

padding:15px;

border-radius:10px;

text-align:center;

box-shadow:0 3px 8px rgba(0,0,0,0.1);

}

/* TRANSACTIONS */

.transactions{

margin:20px;

}

/* BOTTOM NAV */

.bottomNav{

position:fixed;

bottom:0;

width:100%;

background:white;

display:flex;

justify-content:space-around;

padding:10px;

box-shadow:0 -3px 10px rgba(0,0,0,0.1);

}

</style>

</head>

<body>

<div class="header">

<h3 id="usernameDisplay">Hello</h3>

</div>

<div class="walletCard">

<h4>Wallet Balance</h4>

<h1 id="walletBalance">₦0</h1>

</div>

<div class="actions">

<div class="actionBtn">Airtime</div>

<div class="actionBtn">Data</div>

<div class="actionBtn">Transfer</div>

<div class="actionBtn">Pay Bills</div>

</div>

<div class="transactions">

<h3>Recent Transactions</h3>

<div id="transactionHistory"></div>

</div>

<div id="adminPanel" style="display:none;margin:20px">

<h3>Admin Panel</h3>

<p>Profit: <span id="profitBalance">₦0</span></p>

</div>

<div class="bottomNav">

<div>Home</div>

<div>Payments</div>

<div>History</div>

<div onclick="logout()">Logout</div>

</div>

</body>
</html>

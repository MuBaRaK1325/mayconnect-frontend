<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<title>MAY-Connect | Dashboard</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="styles.css">

<style>

/* GENERAL THEME */

body{
background:#000;
color:white;
font-family:Arial;
}

/* PROFILE PANEL */

.profilePanel{
position:fixed;
bottom:0;
left:0;
width:100%;
height:100%;
background:#000;
z-index:5000;
transform:translateY(100%);
transition:0.4s;
padding:20px;
overflow:auto;
}

.profilePanel.show{
transform:translateY(0);
border-top:2px solid #3b78e7;
}

.avatar{
width:70px;
height:70px;
border-radius:50%;
background:#3b78e7;
display:flex;
align-items:center;
justify-content:center;
font-size:28px;
margin:auto;
}

.profileBtn{
width:100%;
padding:14px;
margin-top:10px;
background:#050b18;
border:1px solid #3b78e7;
border-radius:10px;
color:white;
text-align:left;
}

/* PIN MODAL */

.pinModal{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:#000c;
display:none;
align-items:center;
justify-content:center;
z-index:6000;
}

.pinBox{
background:#050b18;
padding:25px;
border-radius:12px;
border:1px solid #3b78e7;
text-align:center;
}

.pinInputs{
display:flex;
gap:10px;
justify-content:center;
margin-top:15px;
}

.pinInputs input{
width:45px;
height:50px;
font-size:22px;
text-align:center;
border-radius:8px;
border:1px solid #3b78e7;
background:black;
color:white;
}

/* SKELETON */

.skeleton{
background:linear-gradient(90deg,#0c1a36 25%,#12264f 37%,#0c1a36 63%);
background-size:400% 100%;
animation:skeletonLoading 1.4s ease infinite;
border-radius:10px;
height:20px;
margin:8px 0;
}

@keyframes skeletonLoading{
0%{background-position:100% 0}
100%{background-position:0 0}
}

/* TRANSACTION CARD */

.transaction-card{
background:#0c1a36;
padding:12px;
border-radius:12px;
margin-top:10px;
}

/* BOTTOM NAV */

.bottomNav{
position:fixed;
bottom:0;
left:0;
width:100%;
height:70px;
background:#08142c;
display:flex;
justify-content:space-around;
align-items:center;
border-top:2px solid #3b78e7;
}

.bottomNav button{
background:none;
border:none;
color:white;
display:flex;
flex-direction:column;
align-items:center;
font-size:20px;
}

.bottomNav span{
font-size:11px;
}

</style>

</head>

<body>

<!-- WALLET -->

<div class="wallet-card">
<p>Wallet Balance</p>
<strong id="walletBalance">₦0</strong>
</div>

<!-- TRANSACTIONS -->

<h3 style="margin-top:20px;">Recent Transactions</h3>

<div id="transactionHistory">

<div class="skeleton"></div>
<div class="skeleton"></div>
<div class="skeleton"></div>

</div>

<!-- PROFILE PANEL -->

<div id="profilePanel" class="profilePanel">

<div style="text-align:center">

<div id="avatar" class="avatar">U</div>

<h3 id="profileName">User</h3>

<p id="profileEmail">email@email.com</p>

</div>

<button id="setPinBtn" class="profileBtn" onclick="openPinModal()">🔐 Set Transaction PIN</button>

<button id="changePinBtn" class="profileBtn" style="display:none;">🔑 Change PIN</button>

<button class="profileBtn">🔒 Change Password</button>

<button class="profileBtn" onclick="toggleBiometric()">🧬 Enable Biometric Login/Purchase</button>

<button class="profileBtn" onclick="callSupport()">📞 Call Support</button>

<button class="profileBtn" onclick="chatSupport()">💬 Contact Developer</button>

<button class="profileBtn" onclick="logout()">🚪 Logout</button>

<button class="profileBtn" onclick="toggleProfile()">⬇ Close</button>

</div>

<!-- PIN MODAL -->

<div id="pinModal" class="pinModal">

<div class="pinBox">

<h3>Create Transaction PIN</h3>

<div class="pinInputs">

<input maxlength="1" oninput="movePin(this,0)">
<input maxlength="1" oninput="movePin(this,1)">
<input maxlength="1" oninput="movePin(this,2)">
<input maxlength="1" oninput="movePin(this,3)">

</div>

<button style="margin-top:20px" onclick="savePin()">Save PIN</button>

</div>

</div>

<!-- NAV -->

<div class="bottomNav">

<button onclick="location.href='dashboard.html'">
🏠
<span>Home</span>
</button>

<button onclick="location.href='data.html'">
📶
<span>Data</span>
</button>

<button onclick="location.href='transactions.html'">
📜
<span>History</span>
</button>

<button onclick="toggleProfile()">
👤
<span>Profile</span>
</button>

</div>

<script src="app.js"></script>

<script>

/* PROFILE PANEL */

function toggleProfile(){

document.getElementById("profilePanel").classList.toggle("show")

}

/* SUPPORT */

function callSupport(){

window.location.href="tel:08117988561"

}

function chatSupport(){

window.location.href="https://wa.me/2348117988561"

}

/* BIOMETRIC */

function toggleBiometric(){

if(localStorage.getItem("biometric")){

localStorage.removeItem("biometric")
alert("Biometric Disabled")

}else{

localStorage.setItem("biometric","true")
alert("Biometric Enabled")

}

}

/* PIN MODAL */

function openPinModal(){

document.getElementById("pinModal").style.display="flex"

document.querySelector(".pinInputs input").focus()

}

/* PIN AUTO MOVE */

function movePin(el,index){

const inputs=document.querySelectorAll(".pinInputs input")

if(el.value && index<3){

inputs[index+1].focus()

}

}

/* SAVE PIN */

async function savePin(){

const inputs=document.querySelectorAll(".pinInputs input")

let pin=""

inputs.forEach(i=>pin+=i.value)

if(pin.length!==4){

alert("Enter 4 digit PIN")
return

}

await fetch("https://mayconnect-backend-1.onrender.com/api/set-pin",{

method:"POST",
headers:{
"Content-Type":"application/json",
Authorization:`Bearer ${localStorage.getItem("token")}`
},
body:JSON.stringify({pin})

})

localStorage.setItem("pinSet","true")

document.getElementById("pinModal").style.display="none"

document.getElementById("setPinBtn").style.display="none"

document.getElementById("changePinBtn").style.display="block"

alert("PIN Saved")

}

/* PROFILE DATA */

async function loadProfile(){

try{

const token = localStorage.getItem("token")

const res = await fetch("https://mayconnect-backend-1.onrender.com/api/me",{
headers:{
Authorization:`Bearer ${token}`
}
})

const user = await res.json()

document.getElementById("profileName").innerText=user.username

document.getElementById("profileEmail").innerText=user.email

document.getElementById("avatar").innerText=user.username.charAt(0).toUpperCase()

/* CHECK PIN STATUS */

if(localStorage.getItem("pinSet")){

document.getElementById("setPinBtn").style.display="none"
document.getElementById("changePinBtn").style.display="block"

}else{

setTimeout(()=>{
openPinModal()
},800)

}

}catch(e){

console.log(e)

}

}

window.onload=loadProfile

</script>

</body>
</html>

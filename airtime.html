<!DOCTYPE html>
<html>

<head>

<title>Buy Airtime</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
background:#020b1f;
color:white;
font-family:Arial;
padding:20px;
}

input{
width:100%;
padding:14px;
margin-top:10px;
border-radius:10px;
border:none;
background:#08142c;
color:white;
}

button{
background:#3b78e7;
border:none;
padding:14px;
border-radius:10px;
color:white;
margin-top:10px;
width:100%;
}

#networkLogo{
width:50px;
margin-top:10px;
display:none;
}

.modalOverlay{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.7);
display:flex;
align-items:center;
justify-content:center;
}

.hidden{
display:none;
}

.modalCard{
background:#08142c;
padding:20px;
border-radius:10px;
width:90%;
max-width:350px;
}

</style>

</head>

<body>

<h2>Buy Airtime</h2>

<input
id="phone"
placeholder="Phone number"
oninput="handlePhoneInput(this)"
>

<img id="networkLogo">

<input
id="amount"
type="number"
placeholder="Amount"
>

<button onclick="openPinModal(null,'airtime')">
Buy Airtime
</button>

<div id="pinModal" class="modalOverlay hidden">

<div class="modalCard">

<h3>Enter Transaction PIN</h3>

<input type="password" id="pin">

<button onclick="confirmPurchase()">Confirm</button>

<button onclick="closePinModal()">Cancel</button>

</div>

</div>

<script src="app.js"></script>

</body>
</html>
